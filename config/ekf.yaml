ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: false           # ✅ ปิด เพราะพื้นขรุขระ
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # Odom: เชื่อแค่ velocity เหมือนเดิม ✅
    odom0: odom/unfiltered  
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,  # <--- แนะนำให้เปิด yaw_vel (omega) จากล้อด้วย เพื่อให้ EKF แม่นขึ้น
                   false, false, false]

        #        [x_pos   , y_pos    , z_pos,
        #         roll    , pitch    , yaw,
        #         x_vel   , y_vel    , z_vel,
        #         roll_vel, pitch_vel, yaw_vel,
        #         x_accel , y_accel  , z_accel]

    # IMU: แก้ให้ถูกต้อง
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,   # ✅ เปิด roll/pitch/yaw ครบ
                  false, false, false,
                  true, true, true,   
                  false, false, false]  
    imu0_nodelay: true                  # ✅ เปิด priority ให้ IMU
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true