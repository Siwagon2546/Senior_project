# =============================================================
#  Nav2 Config สำหรับ Isaac ROS (VSLAM + NvBlox) — ไม่ใช้ LiDAR
#  Camera: Intel RealSense (ผ่าน realsense_example.launch.py)
#  Localization: cuVSLAM (publish map→odom transform อัตโนมัติ)
#  Obstacle Detection: NvBlox (global) + RealSense PointCloud (local)
# =============================================================

# ------------------------------------------------------------
# [1] BT Navigator
# ------------------------------------------------------------
bt_navigator:
  ros__parameters:
    use_sim_time: False
    global_frame: map
    robot_base_frame: base_link
    # cuVSLAM publish odometry ที่ topic นี้ — ตรวจสอบด้วย:
    # ros2 topic list | grep visual_slam
    odom_topic: /visual_slam/tracking/odometry
    bt_loop_duration: 10
    default_server_timeout: 20
    default_bt_xml_filename: "navigate_to_pose_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_path_expiring_timer_condition
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

# ------------------------------------------------------------
# [2] Controller Server
# ------------------------------------------------------------
controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.25
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25
      yaw_goal_tolerance: 0.25

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.3
      lookahead_dist: 0.6
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.8
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: False
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: True
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: True
      use_fixed_curvature_lookahead: False
      curvature_estimation_type: "FORWARD"
      use_cost_regulated_linear_velocity_scaling: False
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      use_rotate_to_heading: True
      allow_reversing: False
      rotate_to_heading_min_angle: 0.785
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0

# ------------------------------------------------------------
# [3] Planner Server
# ------------------------------------------------------------
planner_server:
  ros__parameters:
    use_sim_time: False
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: False
      allow_unknown: True

# ------------------------------------------------------------
# [4] Global Costmap
#   - static_layer: รับ occupancy grid 2D จาก NvBlox
#   - inflation_layer: ขยาย obstacle เพื่อ safety margin
#
# NOTE: NvBlox publish map ที่ topic นี้:
#   /nvblox_node/combined_occupancy_grid  (realsense_example mode)
# ตรวจสอบด้วย: ros2 topic list | grep nvblox
# ------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      # Robot footprint (สี่เหลี่ยม) — แก้ให้ตรงกับหุ่นจริง (หน่วย: เมตร)
      footprint: "[ [0.4, 0.225], [0.4, -0.225], [-0.4, -0.225], [-0.4, 0.225] ]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: True
      plugins: ["static_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
        # NvBlox publish occupancy grid ที่นี่ (realsense_example.launch.py mode=dynamic)
        # ถ้าใช้ map_server แทน ให้เปลี่ยนเป็น topic: /map
        topic: "/nvblox_node/combined_occupancy_grid"
        enabled: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55  # ควรมากกว่าหรือเท่ากับ footprint ครึ่งหนึ่ง

# ------------------------------------------------------------
# [5] Local Costmap
#   - voxel_layer: ใช้ PointCloud2 จาก RealSense โดยตรง
#   - inflation_layer: safety margin รอบ obstacle ใกล้ๆ
#
# ⚠️ IMPORTANT: ตรวจสอบ topic PointCloud ด้วยคำสั่ง:
#   ros2 topic list | grep points
#   ros2 topic info /camera/depth/color/points
# ------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: False
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: True
      width: 4
      height: 4
      footprint: "[ [0.4, 0.225], [0.4, -0.225], [-0.4, -0.225], [-0.4, 0.225] ]"
      footprint_padding: 0.03
      resolution: 0.05
      track_unknown_space: True
      plugins: ["voxel_layer", "inflation_layer"]

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: pointcloud

        pointcloud:
          # ✅ ตรวจสอบ topic นี้ให้ถูกต้อง — อาจเป็น:
          #   /camera/depth/color/points          (RealSense default)
          #   /camera/camera/depth/color/points   (RealSense ROS2 wrapper บางเวอร์ชัน)
          #   /camera0/depth/color/points         (Isaac ROS multi-camera)
          topic: /camera/depth/color/points
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05  # ตัด noise พื้นออก
          clearing: True
          marking: True
          data_type: "PointCloud2"  # ✅ ต้องเป็น PointCloud2 ไม่ใช่ LaserScan
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.45

# ------------------------------------------------------------
# [6] Behavior Server
# ------------------------------------------------------------
behavior_server:
  ros__parameters:
    use_sim_time: False
    global_frame: odom
    robot_base_frame: base_link
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 0.8
    min_rotational_vel: 0.2
    rotational_acc_lim: 3.2
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

# ------------------------------------------------------------
# [7] Smoother Server (optional แต่แนะนำ)
# ------------------------------------------------------------
smoother_server:
  ros__parameters:
    use_sim_time: False
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# ------------------------------------------------------------
# [8] Velocity Smoother (ลด jerk ของ cmd_vel)
# ------------------------------------------------------------
velocity_smoother:
  ros__parameters:
    use_sim_time: False
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [0.5, 0.0, 1.0]
    min_velocity: [-0.5, 0.0, -1.0]
    max_accel: [0.1, 0.0, 0.1]
    max_decel: [0.1, 0.0, 0.1]
    odom_topic: /visual_slam/tracking/odometry
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# ------------------------------------------------------------
# [9] Map Server
#   ใช้ serve static map ให้ global_costmap static_layer
#   (ถ้าใช้ NvBlox occupancy grid แบบ live ให้ comment ส่วนนี้ออก)
# ------------------------------------------------------------
# map_server:
#   ros__parameters:
#     use_sim_time: False
#     yaml_filename: "/path/to/your/map.yaml"

# ------------------------------------------------------------
# [10] Lifecycle Manager
# ------------------------------------------------------------
lifecycle_manager:
  ros__parameters:
    use_sim_time: False
    autostart: True
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - smoother_server
      - velocity_smoother