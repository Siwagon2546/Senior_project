ekf_filter_node:
  ros__parameters:
    frequency: 50.0
    sensor_timeout: 0.2           # ✅ เพิ่มเป็น 200ms รองรับ VSLAM delay
    two_d_mode: false
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    publish_tf: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # --- Encoder: เชื่อแค่ velocity ---
    odom0: odom/unfiltered #wheel_odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  false, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    # --- VSLAM: เชื่อ pose + yaw ---   ✅ เพิ่มใหม่
    odom1: /visual_slam/tracking/odometry
    odom1_config: [true,  true,  true,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false
    odom1_queue_size: 10

    # --- IMU: เชื่อแค่ roll/pitch + angular velocity ---
    imu0: /imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,  # ✅ ปิด yaw — ให้ VSLAM จัดการแทน
                  false, false, false,
                  true,  true,  true,
                  false, false, false]
    imu0_nodelay: true
    imu0_queue_size: 20
    imu0_differential: false
    imu0_relative: false              # ✅ แก้เป็น false
    imu0_remove_gravitational_acceleration: true